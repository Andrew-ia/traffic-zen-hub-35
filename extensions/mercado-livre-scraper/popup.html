<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Pro ML</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="hero">
    <div>
      <div class="hero__kicker">Traffic Pro</div>
      <div class="hero__title">Assistente Mercado Livre</div>
      <div class="hero__subtitle">Analise só a página que você abriu. Sem scraping em massa.</div>
    </div>
  </header>

  <section class="panel settings">
    <div class="panel__header">
      <h2>Plataforma</h2>
    </div>
    <label class="field">
      <span>URL da plataforma</span>
      <input id="platform-url" type="url" placeholder="http://localhost:8080" />
    </label>
    <div class="settings__actions">
      <button id="save-settings" class="btn btn-secondary" type="button">Salvar</button>
      <button id="open-research" class="btn btn-primary" type="button">Pesquisa de Mercado</button>
      <button id="open-side-panel" class="btn btn-secondary btn-wide" type="button">Abrir painel lateral</button>
    </div>
  </section>

  <section class="panel">
    <div class="panel__header">
      <h2>Página atual</h2>
      <span id="page-badge" class="pill">Aguardando</span>
    </div>
    <div id="status" class="status">Abra uma página ou busca do Mercado Livre.</div>
    <div id="context-summary" class="summary"></div>
    <div id="primary-actions" class="actions"></div>
  </section>

  <section class="panel">
    <div class="panel__header">
      <h2>Itens visíveis</h2>
      <span id="items-count" class="pill pill-muted">0</span>
    </div>
    <div id="items-list" class="items-list">
      <div class="empty-state">Nenhum item carregado.</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel__header">
      <h2>Candidatos salvos</h2>
      <button id="clear-saved" class="link-btn" type="button">Limpar</button>
    </div>
    <div id="saved-list" class="items-list">
      <div class="empty-state">Nenhum candidato salvo.</div>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
